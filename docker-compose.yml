version: "3.8"

services:
  mimir-db:
    image: postgres:16-alpine
    container_name: mimir-db
    environment:
      POSTGRES_DB: mimir
      POSTGRES_USER: ${DB_USER:-mimir}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - mimir-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mimir} -d mimir"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mimir-network
    user: "postgres"

  mimir-keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: mimir-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://mimir-db:5432/mimir
      KC_DB_USERNAME: ${DB_USER:-mimir}
      KC_DB_PASSWORD: ${DB_PASSWORD:-changeme}
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mimir-db:
        condition: service_healthy
    networks:
      - mimir-network

  mimir-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: mimir-api:latest
    container_name: mimir-api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=mimir-db;Port=5432;Database=mimir;Username=${DB_USER:-mimir};Password=${DB_PASSWORD:-changeme}
      RabbitMQ__Host: mimir-rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__User: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
      Keycloak__Url: http://mimir-keycloak:8080
      Keycloak__Realm: mimir
      Keycloak__ClientId: mimir-api
      Keycloak__ClientSecret: ${KEYCLOAK_CLIENT_SECRET:-dev-secret}
      LiteLLM__BaseUrl: http://mimir-litellm:4000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      mimir-db:
        condition: service_healthy
      mimir-keycloak:
        condition: service_healthy
      mimir-rabbitmq:
        condition: service_healthy
    networks:
      - mimir-network


  mimir-litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: mimir-litellm
    command: --config /app/config.yaml --port 4000 --num_workers 1
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mimir-network

  mimir-telegram:
    build:
      context: .
      dockerfile: docker/telegram/Dockerfile.telegram
    container_name: mimir-telegram
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Api__BaseUrl=http://mimir-api:5000
      - ConnectionStrings__DefaultConnection=Host=mimir-db;Port=5432;Database=mimir;Username=${DB_USER:-mimir};Password=${DB_PASSWORD:-changeme}
    depends_on:
      mimir-db:
        condition: service_healthy
    networks:
      - mimir-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  mimir-sandbox:
    build:
      context: ./docker/sandbox
      dockerfile: Dockerfile
    image: mimir-sandbox:latest
    container_name: mimir-sandbox
    # One-shot container — built here, managed by SandboxService at runtime.
    # No ports exposed, no network access. Containers are created per execution
    # with: network_mode: none, read_only: true, tmpfs /tmp (100MB),
    # memory: 512MB, cpus: 1, user: sandbox, seccomp: docker/sandbox/seccomp-profile.json
    profiles:
      - sandbox-build

  mimir-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mimir-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - mimir-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mimir-network
networks:
  mimir-network:
    driver: bridge

volumes:
  mimir-db-data:
    driver: local
  mimir-rabbitmq-data:
    driver: local

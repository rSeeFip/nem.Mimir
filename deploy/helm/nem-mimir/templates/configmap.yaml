apiVersion: v1
kind: ConfigMap
metadata:
  name: '{{ include "nem-mimir.fullname" . }}'
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    helm.sh/chart: '{{ include "nem-mimir.chart" . }}'
    app.kubernetes.io/name: '{{ include "nem-mimir.name" . }}'
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/version: '{{ .Chart.AppVersion }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
data:
  ASPNETCORE_ENVIRONMENT: {{ .Values.config.env | quote }}
  ASPNETCORE_HTTP_PORTS: {{ .Values.config.httpPort | quote }}
  Logging__LogLevel__Default: {{ .Values.config.logLevel | quote }}

  Jwt__Authority: {{ .Values.config.jwt.authority | quote }}
  Jwt__Audience: {{ .Values.config.jwt.audience | quote }}
  Jwt__RequireHttpsMetadata: {{ .Values.config.jwt.requireHttpsMetadata | quote }}

  LiteLlm__BaseUrl: {{ .Values.config.liteLlm.baseUrl | quote }}
  LiteLlm__TimeoutSeconds: {{ .Values.config.liteLlm.timeoutSeconds | quote }}

  InferencePolicy__Enabled: {{ .Values.config.inferencePolicy.enabled | quote }}
  InferencePolicy__DefaultPolicy: {{ .Values.config.inferencePolicy.defaultPolicy | quote }}
  InferencePolicy__Action: {{ .Values.config.inferencePolicy.action | quote }}

  TokenBudgetGovernor__DefaultBudget: {{ .Values.config.tokenBudgetGovernor.defaultBudget | quote }}
  TokenBudgetGovernor__WarnThresholdPercent: {{ .Values.config.tokenBudgetGovernor.warnThresholdPercent | quote }}

  Guardrails__Enabled: {{ .Values.config.guardrails.enabled | quote }}
  Guardrails__MaxOutputTokens: {{ .Values.config.guardrails.maxOutputTokens | quote }}
  Guardrails__ActiveBundle: {{ .Values.config.guardrails.activeBundle | quote }}

  ReplayBuffer__MaxMessages: {{ .Values.config.replayBuffer.maxMessages | quote }}
  ReplayBuffer__WindowMinutes: {{ .Values.config.replayBuffer.windowMinutes | quote }}

  Observability__Enabled: {{ .Values.config.observability.enabled | quote }}
  Observability__ServiceName: {{ .Values.config.observability.serviceName | quote }}

  Sanitization__MaxMessageLength: {{ .Values.config.sanitization.maxMessageLength | quote }}
  Sanitization__LogSuspiciousPatterns: {{ .Values.config.sanitization.logSuspiciousPatterns | quote }}
  Sanitization__StripHtmlTags: {{ .Values.config.sanitization.stripHtmlTags | quote }}

  Cors__AllowedOrigins__0: {{ index .Values.config.cors.allowedOrigins 0 | quote }}
  Cors__AllowedMethods__0: {{ index .Values.config.cors.allowedMethods 0 | quote }}
  Cors__AllowedMethods__1: {{ index .Values.config.cors.allowedMethods 1 | quote }}
  Cors__AllowedMethods__2: {{ index .Values.config.cors.allowedMethods 2 | quote }}
  Cors__AllowedMethods__3: {{ index .Values.config.cors.allowedMethods 3 | quote }}
  Cors__AllowedHeaders__0: {{ index .Values.config.cors.allowedHeaders 0 | quote }}
  Cors__AllowedHeaders__1: {{ index .Values.config.cors.allowedHeaders 1 | quote }}
  Cors__AllowedHeaders__2: {{ index .Values.config.cors.allowedHeaders 2 | quote }}

  AllowedHosts: {{ .Values.config.allowedHosts | quote }}

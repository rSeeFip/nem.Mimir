apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir-api-dev
  labels:
    app.kubernetes.io/name: mimir-api
    app.kubernetes.io/instance: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mimir-api
      app.kubernetes.io/instance: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mimir-api
        app.kubernetes.io/instance: dev
    spec:
      containers:
        - name: mimir-api
          image: ghcr.io/nem-ecosystem/nem-mimir-typed-ids:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: mimir-api-dev-config
            - secretRef:
                name: mimir-api-dev-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore nem.Mimir.slnx

      - name: Build
        run: dotnet build nem.Mimir.slnx --no-restore --warnaserrors

      - name: Test
        run: dotnet test nem.Mimir.slnx --no-build --filter "Category!=Integration"

      - name: Typed-ID conformance checks
        run: dotnet test nem.Mimir.slnx --no-build --filter "Conformance|TypedId"

  integration-tests:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore nem.Mimir.slnx

      - name: Build
        run: dotnet build nem.Mimir.slnx --no-restore --warnaserrors

      - name: Integration Test
        continue-on-error: true
        run: dotnet test nem.Mimir.slnx --no-build --filter "Category=Integration"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore nem.Mimir.slnx

      - name: Check NuGet vulnerabilities
        run: dotnet list nem.Mimir.slnx package --vulnerable --include-transitive

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore nem.Mimir.slnx

      - name: Check code formatting
        run: dotnet format nem.Mimir.slnx --verify-no-changes

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: src/mimir-chat
        run: npm ci

      - name: Lint
        working-directory: src/mimir-chat
        run: npm run lint

      - name: Test
        working-directory: src/mimir-chat
        run: npm test

      - name: Build
        working-directory: src/mimir-chat
        run: npm run build

  docker-lint:
    name: Docker Lint + Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/api/Dockerfile

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/nem-mimir

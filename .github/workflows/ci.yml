name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore nem.Mimir.slnx

      - name: Build
        run: dotnet build nem.Mimir.slnx --no-restore --warnaserrors

      - name: Test
        run: dotnet test nem.Mimir.slnx --no-build --filter "Category!=Integration"

      - name: Typed-ID conformance checks
        run: dotnet test nem.Mimir.slnx --no-build --filter "Conformance|TypedId"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore nem.Mimir.slnx

      - name: Check NuGet vulnerabilities
        run: dotnet list nem.Mimir.slnx package --vulnerable --include-transitive

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore nem.Mimir.slnx

      - name: Check code formatting
        run: dotnet format nem.Mimir.slnx --verify-no-changes
